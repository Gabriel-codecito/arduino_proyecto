{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Inicio de Sesión | Puingenierías</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to bottom right, #004e92, #000428);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      width: 350px;
      text-align: center;
    }

    h2 {
      color: #ffcc00;
      margin-bottom: 20px;
    }

    .btn-login {
      background: #ffcc00;
      color: black;
      font-weight: bold;
      width: 100%;
      border-radius: 10px;
    }

    .btn-login:hover {
      background: #ffaa00;
    }

    .alert {
      background-color: #4b2c5e;
      color: white;
      border: none;
      border-radius: 10px;
    }

    input.form-control {
      border-radius: 10px !important;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Inicio de Sesión</h2>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-warning">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <input 
          type="text" 
          name="username" 
          class="form-control" 
          placeholder="Usuario" 
          required>
      </div>

      <div class="mb-3">
        <input 
          type="password" 
          name="password" 
          class="form-control" 
          placeholder="Contraseña" 
          required>
      </div>

      <button type="submit" class="btn btn-login">
        Entrar
      </button>
    </form>
  </div>

</body>
</html>
