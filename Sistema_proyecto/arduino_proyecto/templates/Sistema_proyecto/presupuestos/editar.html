{% extends "Sistema_proyecto/administrador/dashboard_admin.html" %}
{% load static %}
{% block title %}Editar Presupuesto{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/admin.css' %}">
{% endblock %}

{% block content %}

<style>
    /* Contenedor principal */
    .pres-edit-wrapper {
        max-width: 520px;
        margin: auto;
        padding-top: 20px;
    }

    /* Tarjeta */
    .pres-edit-card {
        background: rgba(15, 15, 15, 0.90);
        padding: 35px;
        border-radius: 18px;
        border: 1px solid rgba(255, 204, 0, 0.25);
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.45);
    }

    /* Título */
    .pres-title {
        font-size: 1.9rem;
        font-weight: bold;
        text-align: center;
        color: #ffcc00;
        margin-bottom: 25px;
        text-shadow: 0 0 10px rgba(255, 204, 0, 0.35);
    }

    /* Inputs del form */
    .pres-edit-card input,
    .pres-edit-card select,
    .pres-edit-card textarea {
        background: #ffffff;
        border-radius: 12px;
        padding: 10px 12px;
        border: 1px solid #ccc;
        width: 100%;
    }

    .pres-edit-card input:focus,
    .pres-edit-card textarea:focus,
    .pres-edit-card select:focus {
        border-color: #ffcc00 !important;
        box-shadow: 0 0 10px rgba(255, 204, 0, 0.4);
    }

    /* Botón */
    .btn-edit-submit {
        background-color: #ffcc00 !important;
        color: black !important;
        font-weight: bold;
        border-radius: 40px;
        padding: 12px 30px;
        display: block;
        margin: 20px auto 0 auto;
        transition: 0.2s;
    }

    .btn-edit-submit:hover {
        background-color: #e6b800 !important;
        transform: scale(1.05);
    }
</style>

<section class="home-admin py-5">
    <div class="container">

        <div class="pres-edit-wrapper">

            <h2 class="pres-title">Editar Presupuesto N° {{ presupuesto.id }}</h2>

            <form method="post">
                {% csrf_token %}

                <div class="pres-edit-card">
                    {{ form.as_p }}

                    <button class="btn btn-edit-submit">Actualizar Presupuesto</button>
                </div>

            </form>

        </div>

    </div>
</section>

{% endblock %}
