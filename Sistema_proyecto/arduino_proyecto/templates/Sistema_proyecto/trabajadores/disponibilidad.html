{% extends "Sistema_proyecto/administrador/dashboard_admin.html" %}

{% block content %}
<div class="container">
    <h2>Disponibilidad de {{ object.nombre }}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-check form-switch mb-3">
            <input class="form-check-input" type="checkbox" name="disponible" 
                   id="disponible" {% if object.disponible %}checked{% endif %}>
            <label class="form-check-label" for="disponible">
                {% if object.disponible %}Disponible{% else %}No disponible{% endif %}
            </label>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'lista_trabajadores' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
