{% extends "base.html" %}
{% block content %}
<div class="login-page">
  <div class="login-box">
    <h2>Inicio de Sesión</h2>
    <form method="post">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Usuario" required class="form-control mb-3">
      <input type="password" name="password" placeholder="Contraseña" required class="form-control mb-3">
      <button type="submit" class="btn btn-warning w-100 fw-bold">Entrar</button>
    </form>
    <p class="mt-3">¿No tienes una cuenta? 
      <a href="{% url 'registro' %}" class="text-warning fw-bold">Regístrate aquí</a>
    </p>
  </div>
</div>
<style>
/*  Fondo corporativo */
body {
  background: linear-gradient(to bottom right, #004e92, #000428);
  font-family: "Segoe UI", sans-serif;
  color: white;
  margin: 0;
  padding-top: 90px; 
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/*  Caja del login */
.login-box {
  background: rgba(255, 255, 255, 0.1);
  padding: 40px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
  width: 380px;
  text-align: center;
  margin-top: 50px; 
}

/*  Título */
h2 {
  color: #ffcc00;
  margin-bottom: 25px;
  font-weight: 700;
}

/*  Campos */
input {
  border-radius: 10px !important;
  text-align: center;
  background-color: #eef3ff;
}

/*  Botón */
.btn-login {
  background: #ffcc00;
  color: black;
  font-weight: bold;
  width: 100%;
  border-radius: 8px;
  transition: background 0.3s;
}

.btn-login:hover {
  background: #ffaa00;
}

/* Enlace de registro */
a {
  color: #ffcc00;
  text-decoration: none;
  font-weight: bold;
}

a:hover {
  text-decoration: underline;
}

/*  Footer */
footer {
  margin-top: auto;
  background: rgba(0, 0, 0, 0.25);
  color: #ccc;
  text-align: center;
  padding: 10px 0;
  width: 100%;
  font-size: 0.9rem;
}

footer a {
  color: #ffcc00;
  margin: 0 8px;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}
</style>
{% endblock %}
