<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Factura{% endblock %}</title>

    <style>
        body {
            background: #ffffff;
            color: #000;
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
        }

        .factura-container {
            max-width: 800px;
            margin: auto;
        }

        h1, h2, h3 {
            margin-bottom: 10px;
        }

        hr {
            border: none;
            border-top: 1px solid #000;
            margin: 20px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border-bottom: 1px solid #000;
            padding: 8px;
            text-align: left;
        }

        .totales {
            text-align: right;
            margin-top: 30px;
        }

        .totales p {
            margin: 4px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 15px;
            background: #000;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="factura-container">
    {% block content %}{% endblock %}
</div>
</body>
</html>
